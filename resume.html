<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume - Jiayun Song</title>
    <style>
        body {
            background-color: #f4f4f4; /* 和主页保持一致的背景色 */
            margin: 0;
            padding: 3rem 1rem;
            display: flex;
            justify-content: center;
        }
        .resume-container {
            max-width: 900px; /* 控制简历显示的最大宽度，确保在电脑上不会太大 */
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); /* 极简的阴影让简历像一张真实的纸 */
            background-color: #fff;
        }
        .resume-container img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        /* 手机端稍微减小一点上下留白 */
        @media (max-width: 768px) {
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="resume-container">
        <img src="assets/简历may.png" alt="Jiayun Song Resume">
    </div>

</body>
</html>
